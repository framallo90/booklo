<div>
  <h2>Libros</h2>

  <div class="toolbar">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Buscar libro</mat-label>
      <input matInput [value]="search" (input)="onSearch($any($event.target).value)" />
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
    <span class="total">{{ total }} resultados</span>
    <button mat-raised-button color="primary" (click)="createBook()">
      <mat-icon>add</mat-icon> Agregar libro
    </button>
  </div>

  @if (loading) {
    <div class="spinner-container">
      <mat-spinner diameter="48" />
    </div>
  } @else {
    <table mat-table [dataSource]="books" class="mat-elevation-z1">

      <ng-container matColumnDef="cover">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let book">
          <img [src]="book.cover_url || 'assets/no-cover.png'" [alt]="book.title" class="cover" />
        </td>
      </ng-container>

      <ng-container matColumnDef="title">
        <th mat-header-cell *matHeaderCellDef>Título</th>
        <td mat-cell *matCellDef="let book">
          <a [routerLink]="['/books', book.id]" class="book-link">{{ book.title }}</a>
          <span class="category">{{ book.category_name }}</span>
        </td>
      </ng-container>

      <ng-container matColumnDef="authors">
        <th mat-header-cell *matHeaderCellDef>Autores</th>
        <td mat-cell *matCellDef="let book">{{ book.authors }}</td>
      </ng-container>

      <ng-container matColumnDef="price">
        <th mat-header-cell *matHeaderCellDef>Precio</th>
        <td mat-cell *matCellDef="let book">${{ book.price }}</td>
      </ng-container>

      <ng-container matColumnDef="stock">
        <th mat-header-cell *matHeaderCellDef>Stock</th>
        <td mat-cell *matCellDef="let book" [class.low-stock]="book.stock < 3">
          {{ book.stock }}
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let book">
          <button mat-icon-button color="primary" (click)="editBook(book)" title="Editar">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="confirmDeactivate(book)" title="Desactivar">
            <mat-icon>block</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <div class="pagination">
      <button mat-icon-button (click)="prevPage()" [disabled]="page === 1">
        <mat-icon>chevron_left</mat-icon>
      </button>
      <span>Página {{ page }} de {{ totalPages }}</span>
      <button mat-icon-button (click)="nextPage()" [disabled]="page >= totalPages">
        <mat-icon>chevron_right</mat-icon>
      </button>
    </div>
  }
</div>
